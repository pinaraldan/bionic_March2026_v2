<body>
  <div id="jspsych-target"></div>
  <div id="file-protocol-warning" style="display:none;position:fixed;top:0;left:0;right:0;background:rgba(0,0,0,.85);color:#fff;padding:0.6em 1em;font-family:sans-serif;font-size:0.9em;text-align:center;z-index:99999;box-sizing:border-box;flex-wrap:wrap;align-items:center;justify-content:center;gap:0.5em;">
    <span>Running from a local file. If audio or images don’t load, try a local server:</span>
    <code style="background:#333;padding:0.3em 0.6em;border-radius:4px;font-size:0.9em">python3 -m http.server 8000</code>
    <span>then open</span>
    <a href="http://localhost:8000/index.html" style="color:#8cf">http://localhost:8000/index.html</a>
    <button type="button" id="file-protocol-dismiss" style="margin-left:0.5em;padding:0.3em 0.8em;cursor:pointer;border-radius:4px;">Dismiss</button>
  </div>
  <script>
    // Support both file:// (local) and http(s):// (e.g. GitHub Pages, local server).
    (function(){
      if (window.location.protocol === 'file:') {
        var el = document.getElementById('file-protocol-warning');
        if (el) {
          el.style.display = 'flex';
          var btn = document.getElementById('file-protocol-dismiss');
          if (btn) btn.addEventListener('click', function(){ el.style.display = 'none'; });
        }
      }
    })();
    // WebAudio is disabled so the study runs from both file:// and HTTP. Preload uses continue_after_error for local robustness.
    // Block names that appear in randomized order (post-warm-up). Used for trial data and summary.
    var RANDOMIZED_BLOCK_NAMES = ['competence','warmth','sPref','physicalDistance','epistemicTrust','help','benAble'];

    var jsPsych=initJsPsych({
      display_element:'jspsych-target',
      use_webaudio:false,
      on_trial_finish: function(data) {
        if (!data) return;
        var trialIndex = (window._qualTrialIndex = (window._qualTrialIndex || 0) + 1);
        var blockName = (data.block != null && data.block !== '') ? String(data.block) : '';
        if (blockName !== window._qualLastBlockName) {
          window._qualBlockIndex = (window._qualBlockIndex || 0) + 1;
          window._qualLastBlockName = blockName;
        }
        var blockIndex = window._qualBlockIndex || 0;
        data.trialIndex = trialIndex;
        data.blockIndex = blockIndex;
        data.trialName = (data.trial_type != null && data.trial_type !== '') ? String(data.trial_type) : '';
        data.blockName = blockName;
        data.questionId = (data.question_id !== undefined && data.question_id !== '') ? String(data.question_id) : ((data.question !== undefined && data.question !== '') ? String(data.question) : '');
        data.timestamp = (data.time_elapsed != null && data.time_elapsed !== '') ? data.time_elapsed : (typeof Date.now === 'function' ? Date.now() : '');
        data.rt = (data.rt != null && data.rt !== '') ? data.rt : '';
        data.correctAnswer = (data.correct_answer !== undefined && data.correct_answer !== '') ? String(data.correct_answer) : '';
        data.stimulusImage = (window._currentTrialStimulusImage != null && window._currentTrialStimulusImage !== '') ? String(window._currentTrialStimulusImage) : '';
        if (window._currentTrialOptionImages != null && window._currentTrialOptionImages !== '') {
          data.optionImages = Array.isArray(window._currentTrialOptionImages) ? window._currentTrialOptionImages.join('|') : String(window._currentTrialOptionImages);
        } else if (data.choices && Array.isArray(data.choices)) {
          data.optionImages = data.choices.map(function(c){ return (typeof c === 'string' && c.indexOf('.') === -1) ? c + '.png' : c; }).join('|');
        } else {
          data.optionImages = '';
        }
        data.optionLabels = (data.choices && Array.isArray(data.choices)) ? data.choices.join('|') : '';
        data.randomizedOrder = RANDOMIZED_BLOCK_NAMES.indexOf(blockName) >= 0;
        if (data.response !== undefined && data.response !== null && data.response_value === undefined && data.choices && Array.isArray(data.choices) && data.choices[data.response] !== undefined) {
          data.response_value = data.choices[data.response];
        }
        if (typeof data.response === 'number') data.responseIndex = data.response;
        data.response = (data.response_value !== undefined && data.response_value !== null) ? data.response_value : ((data.response !== undefined && data.response !== null) ? String(data.response) : '');
        // Ensure every export field is present; use empty string when not applicable
        if (data.trialName === undefined) data.trialName = '';
        if (data.blockName === undefined) data.blockName = '';
        if (data.questionId === undefined) data.questionId = '';
        if (data.response === undefined) data.response = '';
        if (data.correctAnswer === undefined) data.correctAnswer = '';
        if (data.stimulusImage === undefined) data.stimulusImage = '';
        if (data.optionImages === undefined) data.optionImages = '';
        if (data.optionLabels === undefined) data.optionLabels = '';
        if (data.randomizedOrder === undefined) data.randomizedOrder = false;
        if (data.timestamp === undefined) data.timestamp = '';
        if (data.rt === undefined) data.rt = '';
        window._currentTrialStimulusImage = '';
        window._currentTrialOptionImages = '';
      }
    });
    // ===== QUALTRICS PID (from URL) =====
const urlParams = new URLSearchParams(window.location.search);
const pid = urlParams.get("pid") || "NA";

// 🔴 REPLACE with your REAL Qualtrics survey URL (used for normal completion and early exit)
const QUALTRICS_REDIRECT_URL = "https://bostonu.qualtrics.com/jfe/form/SV_3kFQQzUVh5Hjdps";

function makeCompactTrials() {
  var trials = jsPsych.data.get().values();

  return trials
    .filter(function(t) {
      // Keep only trials needed for analysis
      return t.block && ![
        'page1',
        'consent',
        'bye_audio',
        'bye_msg',
        'teacher',
        'activity_check',
        'great_intro',
        'disDesc_delay'
      ].includes(t.block);
    })
    .map(function(t) {
      var q = t.question_id || t.questionId || t.question || "";
      var r =
        (t.responseIndex !== undefined && t.responseIndex !== null)
          ? t.responseIndex
          : (t.response !== undefined ? t.response : "");
      var p = (t.phase !== undefined ? t.phase : "");

      // Compact record: [block, question, response, phase]
      return [t.block || t.blockName || "", q, r, p];
    });
}

// Package all experiment data and redirect to Qualtrics. Call only after data is final (e.g. on button click).
// endStatus: 'completed' (finished normally), 'ended_early' (End session from warm-up), or 'failed_warmup' (if set elsewhere).
function redirectToQualtrics() {
  window._endStatus = window._endStatus || 'completed';
  var rawJson = jsPsych.data.get().json();
  var trials = [];
  try { trials = JSON.parse(rawJson); } catch (e) { trials = []; }
  var seen = {};
  var finalBlockOrder = [];
  for (var i = 0; i < trials.length; i++) {
    var b = trials[i].blockName != null ? trials[i].blockName : trials[i].block;
    if (b && !seen[b]) { seen[b] = true; finalBlockOrder.push(b); }
  }
  var lastBlock = trials.length ? (trials[trials.length - 1].blockName != null ? trials[trials.length - 1].blockName : trials[trials.length - 1].block) : '';
  var completed = (lastBlock === 'return_to_survey' || lastBlock === 'end_session');
  var finalBlockOrderStr = finalBlockOrder.join('|');
  var compactTrials = makeCompactTrials();

  var payload = {
    p: pid,
    e: window._endStatus,
    c: completed ? 1 : 0,
    o: finalBlockOrder,
    t: compactTrials
  };
  var jsonStr = "testdata";
  window.location.href =
    QUALTRICS_REDIRECT_URL +
    "?pid=" + encodeURIComponent(pid) +
    "&expComplete=1" +
    "&endStatus=" + encodeURIComponent(window._endStatus) +
    "&jspsychdata=" + encodeURIComponent(jsonStr);
}

// attach pid to every trial automatically
jsPsych.data.addProperties({ pid: pid });

    function block(n,t){return{timeline:t,data:{block:n}};}
    function replayBtn(src){return'<span class="replay-wrap"><audio src="'+src+'"></audio><button class="replay-btn" type="button" disabled onclick="this.previousElementSibling.play()">↻</button></span>';}
    function runLoomSchedule(sched,delayStart){var d=typeof delayStart==='number'?delayStart:0;var t0=performance.now()/1e3;var iv=setInterval(function(){var t=Math.max(0,(performance.now()/1e3-t0)-d);sched.forEach(function(s){var el=document.querySelector(s.sel);if(el){if(t>=s.start&&t<=s.end)el.classList.add('loom');else el.classList.remove('loom');}});var maxEnd=sched.reduce(function(m,s){return Math.max(m,s.end);},0);if(t>maxEnd+2)clearInterval(iv);},50);}
    function setAudioDur(key,player){var d;if(player.webAudioBuffer)d=player.webAudioBuffer.duration;else if(player.audio)d=player.audio.duration;else d=40;window[key]=(typeof d==='number'&&d>0&&isFinite(d))?d:40;}
    function safeAudioStop(ap){try{if(ap&&typeof ap.stop==='function')ap.stop();else if(ap&&ap.audio&&ap.audio.pause){ap.audio.pause();ap.audio.currentTime=0;}}catch(e){}}
    function whenAudioEnds(pl,cb){if(pl&&pl.audio&&typeof pl.audio.addEventListener==='function')pl.audio.addEventListener('ended',cb,{once:true});else if(pl&&typeof pl.addEventListener==='function')pl.addEventListener('ended',cb);}

    var comp_q3_phase3_node={timeline:[comp_q3_phase3],conditional_function:function(){var d=jsPsych.data.getLastTrialData().values()[0];return d&&d.block==='competence'&&d.question_id==='Q3'&&d.phase===2&&(d.response==null||d.response===undefined);}};

    var competence_scenario_timeline=[assignConditionGenderTrial,assignCompetenceVersion,getComp1Dur,getComp1CopyDur,getComp1CopyCopyDur,getFirst15Dur,getSecond15Dur,competence_intro,{timeline:[comp_q1_unified,comp_q2_unified,comp_q3_unified],data:{block:'competence'}}];
    var competence_block=block('competence',[{timeline:competence_scenario_timeline}]);

    // ---- disDesc SCREEN (disDesc + wheel1, noDiss1, blind1; shown after orange or Continue) ----
    // Reusable trial: play "great" on a completely empty screen (used before each post-warm-up block).
    var great_intro_trial={type:jsPsychAudioKeyboardResponse,stimulus:'great.mp3',prompt:'',choices:'NO_KEYS',trial_ends_after_audio:true,response_allowed_while_playing:false,data:{block:'great_intro'}};
    var disDesc_loomSched=[{start:10.719,end:12.734,sel:'#disDesc-blind1'},{start:14.620,end:16.679,sel:'#disDesc-wheel1'}];
    var screen_disDesc={type:jsPsychAudioKeyboardResponse,stimulus:'disDesc.mp3',prompt:'<div class="disDesc-visuals"><span id="disDesc-wheel1" class="disDesc-loom-wrap"><img src="wheel1.png" alt="Wheel"/></span><img src="noDiss1.png" alt="No Diss"/><span id="disDesc-blind1" class="disDesc-loom-wrap"><img src="blind1.png" alt="Blind"/></span></div>',choices:'NO_KEYS',trial_ends_after_audio:true,response_allowed_while_playing:false,data:{block:'disDesc'},on_load:function(){window._currentTrialStimulusImage='wheel1.png|noDiss1.png|blind1.png';try{var sched=disDesc_loomSched,started=0;function go(){if(started++)return;runLoomSchedule(sched);}jsPsych.pluginAPI.getAudioPlayer('disDesc.mp3').then(function(p){if(p.audio&&typeof p.audio.addEventListener==='function'){p.addEventListener('playing',function on(){p.removeEventListener('playing',on);go();});setTimeout(go,200);}else{go();}}).catch(go);}catch(e){console.error('disDesc loom:',e);}}};
    var disDesc_post_delay={type:jsPsychHtmlKeyboardResponse,stimulus:'',choices:'NO_KEYS',trial_duration:3000,data:{block:'disDesc_delay'}};
    var disDesc_flow=[screen_disDesc,disDesc_post_delay];

    // ---- CONDITIONAL TIMELINES ----
    var disDesc_if_orange_warmup={timeline:disDesc_flow,conditional_function:function(){return window._lastWarmUpStimulus==='warmUp.mp3'&&(window._lastWarmUpResponse===0||window._lastWarmUpResponse==='0');}};
    var disDesc_if_orange_warmup2={timeline:disDesc_flow,conditional_function:function(){return window._lastWarmUpStimulus==='warmUp2.mp3'&&(window._lastWarmUpResponse===0||window._lastWarmUpResponse==='0');}};
    var disDesc_if_continue={timeline:disDesc_flow,conditional_function:function(){return window._activityChoiceIndex===1;}};
    var teacher_if_no_response={timeline:[screen_teacher,screen_activity_question,screen_end_session,disDesc_if_continue],conditional_function:function(){return window._sawWarmUp3===true;}};
    var warmup3_if_no_response_or_blue={timeline:[getWarmUp3Dur,screen_warmup3],conditional_function:function(){return window._lastWarmUpStimulus==='warmUp2.mp3'&&(window._lastWarmUpResponse===null||window._lastWarmUpResponse===1||window._lastWarmUpResponse==='1');}};
    var warmup2_if_no_response={timeline:[getWarmUp2Dur,screen_warmup2,warmup3_if_no_response_or_blue,disDesc_if_orange_warmup2],conditional_function:function(){return window._lastWarmUpStimulus==='warmUp.mp3'&&!(window._lastWarmUpResponse===0||window._lastWarmUpResponse==='0');}};
    var warmup_if_up={timeline:[block('warmUp',[getWarmUpDur,screen_warmup,warmup2_if_no_response,teacher_if_no_response,disDesc_if_orange_warmup])],conditional_function:function(){return true;}};

// ===== FINAL PAGE (RETURN TO QUALTRICS) =====
// Last page: message + button; redirect only after button click so data is finalized first.
var return_to_qualtrics = {
  type: jsPsychHtmlButtonResponse,
  stimulus: '<p style="font-size:1.2em;text-align:center;max-width:560px;margin:0 auto">This session is complete. Please click the button on the right to return to the survey. Do not close this tab until the survey page has loaded.</p>',
  choices: ['Return to survey'],
  data: { block: 'return_to_survey' },
  on_finish: function () {
    redirectToQualtrics();
  }
};

    // After warm-up: randomized order of 7 blocks; then final end audio+visual, then disFam, then Qualtrics return.
    var screen_end_main={type:jsPsychAudioKeyboardResponse,stimulus:'end.mp3',prompt:'<div style="text-align:center"><img src="teacher.png" alt="Teacher" style="max-height:70vh;max-width:90vw"/></div>',choices:'NO_KEYS',trial_ends_after_audio:true,response_allowed_while_playing:false,data:{block:'end_audio'}};
    var end_audio_block=block('end_audio',[screen_end_main]);
    var _postWarmupBlocksShuffled=jsPsych.randomization.shuffle([competence_block,warmth_block,sPref_block,physicalDistance_block,epistemicTrust_block,help_block,benAble_block]);
    var rest_if_consented={timeline:[warmup_if_up].concat(_postWarmupBlocksShuffled).concat([disFam_block,end_audio_block,return_to_qualtrics]),conditional_function:function(){return window._consentAccepted===true;}};

    // ---- MAIN EXPERIMENT ----
    jsPsych.run([
  preload,
  screen_page1,
  consent_block,
  rest_if_consented
]);
  </script>
